<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2a47c2" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0d1a54" media="(prefers-color-scheme: dark)">
  <meta name="description" content="An accessible, green, and inclusive trip-planning companion for DiscoverEU participants across 33 European countries.">
  <meta name="keywords" content="DiscoverEU, Interrail, Eurail, trip planner, Europe, youth travel, EU, accessible travel">
  <meta name="author" content="DiscoverEU Companion contributors">

  <!-- Open Graph -->
  <meta property="og:title" content="DiscoverEU Companion">
  <meta property="og:description" content="Engage · Connect · Empower — an accessible, green, and inclusive trip-planning companion for all European youth.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://embeddedjedi.github.io/discovereu-companion/">

  <title>DiscoverEU Companion — Plan your European journey</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

  <!-- App styles -->
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/map.css">
  <link rel="stylesheet" href="css/crisis-shield.css">
  <link rel="stylesheet" href="css/a11y.css">
  <link rel="stylesheet" href="css/a11y-lowbw.css">
  <link rel="stylesheet" href="css/buddy.css">
  <link rel="stylesheet" href="css/coach.css">

  <!-- PWA manifest + icons -->
  <link rel="manifest" href="assets/manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="apple-touch-icon" href="assets/icons/icon.svg">

  <!-- Inline early theme script — prevents flash of wrong theme -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('discoveru:theme');
        var theme = saved || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { /* localStorage blocked */ }
    })();
  </script>
</head>
<body>

  <!-- Loading shell -->
  <div class="app-loading" id="appLoading">
    <div class="spinner" aria-label="Loading"></div>
  </div>

  <div class="app" id="app">

    <!-- ═══════ Header ═══════ -->
    <header class="app-header" role="banner">
      <a href="#" class="brand" aria-label="DiscoverEU Companion home">
        <span class="brand-mark" aria-hidden="true">★</span>
        <span class="brand-text">
          <strong class="brand-title">DiscoverEU Companion</strong>
          <span class="brand-sub" data-i18n="brand.tagline">Engage · Connect · Empower</span>
        </span>
      </a>

      <div class="header-actions">
        <!-- Language switcher -->
        <div class="lang-switch" role="group" aria-label="Language">
          <select id="langSelect" aria-label="Select language">
            <option value="en">EN</option>
            <option value="tr">TR</option>
            <option value="de">DE</option>
            <option value="fr">FR</option>
            <option value="es">ES</option>
            <option value="it">IT</option>
          </select>
        </div>

        <!-- AI assistant trigger -->
        <button class="icon-btn" id="btnAI" aria-label="Open AI assistant"
                data-i18n-aria="header.aiAssistant">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 2a4 4 0 0 0-4 4v1a4 4 0 0 0-4 4v1a4 4 0 0 0 4 4v1a4 4 0 0 0 8 0v-1a4 4 0 0 0 4-4v-1a4 4 0 0 0-4-4V6a4 4 0 0 0-4-4Z"/>
            <path d="M9 10h.01M15 10h.01M9 14s1 1.5 3 1.5S15 14 15 14"/>
          </svg>
        </button>

        <!-- Theme toggle -->
        <button class="icon-btn" id="btnTheme" aria-label="Toggle theme"
                data-i18n-aria="header.toggleTheme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
        </button>

        <button id="btnSettings" class="btn-icon" type="button"
                aria-label="Settings — re-open the welcome wizard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>

        <button id="aiSuggestBtn" class="btn btn-primary btn-sm" type="button" data-i18n="ai.headerCta">✨ AI Öneri</button>

        <!-- Share -->
        <button class="icon-btn" id="btnShare" aria-label="Share route"
                data-i18n-aria="header.share">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <path d="m8.59 13.51 6.83 3.98M15.41 6.51l-6.82 3.98"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ═══════ Main content ═══════ -->
    <main class="app-main">
      <!-- Persistent map container (shown/hidden by map page module) -->
      <div class="map-container" id="mapContainer">
        <div id="map" role="region" aria-label="Interactive map of Europe"></div>
        <!-- Map legend -->
        <div class="map-legend" id="mapLegend" hidden>
          <div class="map-legend-title" data-i18n="map.legend.title">Map key</div>
          <div class="map-legend-item">
            <span class="map-legend-swatch" style="background: var(--accent-soft)"></span>
            <span data-i18n="map.legend.participating">Participating</span>
          </div>
          <div class="map-legend-item">
            <span class="map-legend-swatch" style="background: var(--eu-gold-300)"></span>
            <span data-i18n="map.legend.inRoute">In your route</span>
          </div>
          <div class="map-legend-item">
            <span class="map-legend-swatch" style="background: var(--bg-sunken); opacity: 0.4; border-style: dashed"></span>
            <span data-i18n="map.legend.nonParticipating">Not in DiscoverEU</span>
          </div>
        </div>
      </div>

      <!-- Side panel (map page — 5 tabs) -->
      <aside class="side-panel" id="sidePanel" data-open="false" aria-label="Details panel">
        <nav class="panel-tabs" role="tablist" aria-label="Panel sections">
          <button class="panel-tab" role="tab" data-tab="detail" aria-selected="true">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="16" x2="12" y2="12"/>
              <line x1="12" y1="8" x2="12.01" y2="8"/>
            </svg>
            <span class="tab-label" data-i18n="panel.tab.detail">Explore</span>
          </button>
          <button class="panel-tab" role="tab" data-tab="route">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="6" cy="19" r="3"/>
              <path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/>
              <circle cx="18" cy="5" r="3"/>
            </svg>
            <span class="tab-label" data-i18n="panel.tab.route">Route</span>
          </button>
          <button class="panel-tab" role="tab" data-tab="budget">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/>
              <path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/>
              <path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>
            </svg>
            <span class="tab-label" data-i18n="panel.tab.budget">Budget</span>
          </button>
          <button class="panel-tab" role="tab" data-tab="compare">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 3v18h18"/>
              <path d="M7 16V9"/>
              <path d="M12 16V5"/>
              <path d="M17 16v-5"/>
            </svg>
            <span class="tab-label" data-i18n="panel.tab.compare">Compare</span>
          </button>
          <button class="panel-tab" role="tab" data-tab="filters">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
              <line x1="4" y1="21" x2="4" y2="14"/>
              <line x1="4" y1="10" x2="4" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="12"/>
              <line x1="12" y1="8" x2="12" y2="3"/>
              <line x1="20" y1="21" x2="20" y2="16"/>
              <line x1="20" y1="12" x2="20" y2="3"/>
              <line x1="1" y1="14" x2="7" y2="14"/>
              <line x1="9" y1="8" x2="15" y2="8"/>
              <line x1="17" y1="16" x2="23" y2="16"/>
            </svg>
            <span class="tab-label" data-i18n="panel.tab.filters">Filter</span>
          </button>
        </nav>
        <div class="panel-body" id="panelBody" role="tabpanel">
          <div class="panel-empty">
            <p data-i18n="panel.empty.message">Select a country on the map to begin</p>
          </div>
        </div>
      </aside>

      <!-- Page content root (router mounts pages here) -->
      <div id="pageRoot" class="page-root"></div>
    </main>

    <!-- ═══════ Bottom navigation (mounted by JS) ═══════ -->
    <div id="bottomNavRoot"></div>

  </div>

  <!-- CDN dependencies -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" defer></script>

  <!-- Accessibility — color-blind simulation SVG filter definitions (v1.5).
       Applied via <html data-a11y-colorblind="..."> selectors in css/a11y.css.
       Matrix values from Daltonize reference (Machado et al. 2009 approximation). -->
  <svg aria-hidden="true" focusable="false" style="position:absolute;width:0;height:0;overflow:hidden;">
    <defs>
      <filter id="cs-protanopia">
        <feColorMatrix type="matrix" values="0.567 0.433 0 0 0  0.558 0.442 0 0 0  0 0.242 0.758 0 0  0 0 0 1 0"/>
      </filter>
      <filter id="cs-deuteranopia">
        <feColorMatrix type="matrix" values="0.625 0.375 0 0 0  0.7 0.3 0 0 0  0 0.3 0.7 0 0  0 0 0 1 0"/>
      </filter>
      <filter id="cs-tritanopia">
        <feColorMatrix type="matrix" values="0.95 0.05 0 0 0  0 0.433 0.567 0 0  0 0.475 0.525 0 0  0 0 0 1 0"/>
      </filter>
    </defs>
  </svg>

  <!-- App entry (ES module) -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
