<!DOCTYPE html>
<html lang="en" data-theme="light">

  <meta name="viewport" content="width=device-width, initial-scale=1">

    resolve identically to the main index.html entry.
  -->
  <base href="../">
  <title data-i18n="group.page.title">Group planning — DiscoverEU Companion</title>

  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/a11y.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/group.css">

  <!-- LZ-string for share URL decode (same CDN as index.html) -->

</head>
<body class="group-page-body">
  <header class="group-page-header">

    <a class="btn btn-ghost" href="./" data-i18n="group.page.backToApp">Back to app</a>

  <main id="group-mount" class="group-page-main" aria-live="polite"></main>

  <script type="module" src="js/pages/group.js"></script>
